name: CI - Continuous Integration

on:
  pull_request:
    branches: [ main, develop ]
  push:
    branches: [ main, develop ]

env:
  DOTNET_VERSION: '8.0.x'
  NODE_VERSION: '20.x'

jobs:
  # Backend Tests
  backend-tests:
    name: Backend - Build & Test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        working-directory: ./backend/MoodTrackerAPI
        run: dotnet restore

      - name: Build backend
        working-directory: ./backend/MoodTrackerAPI
        run: dotnet build --configuration Release --no-restore

      - name: Run unit tests
        working-directory: ./backend/MoodTrackerAPI.Tests
        run: dotnet test --configuration Release --no-build --verbosity normal --logger "trx;LogFileName=test-results.trx" || true

      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Backend Test Results
          path: '**/test-results.trx'
          reporter: dotnet-trx
          fail-on-error: false

  # Frontend Tests
  frontend-tests:
    name: Frontend - Build & Lint
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Lint frontend code
        working-directory: ./frontend
        run: npm run lint || echo "Linting completed with warnings"

      - name: Build frontend
        working-directory: ./frontend
        env:
          VITE_API_URL: http://localhost:5162/api/MoodEntries
        run: npm run build

      - name: Check build output
        working-directory: ./frontend
        run: |
          if [ -d "dist" ]; then
            echo "✅ Build successful - dist folder created"
            ls -la dist
          else
            echo "❌ Build failed - no dist folder"
            exit 1
          fi

  # Docker Build Test
  docker-build:
    name: Docker - Build & Validate
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend/MoodTrackerAPI
          file: ./backend/MoodTrackerAPI/Dockerfile
          push: false
          tags: moodtracker-backend:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false
          tags: moodtracker-frontend:test
          build-args: |
            VITE_API_URL=http://localhost:5162/api/MoodEntries
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Integration Test (Optional - requires database)
  integration-test:
    name: Integration - Docker Compose Test
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create .env files
        run: |
          echo "VITE_API_URL=http://localhost:5162/api/MoodEntries" > frontend/.env

      - name: Start services
        run: docker compose up -d --build

      - name: Wait for services to be healthy
        run: |
          echo "Waiting for services to start..."
          sleep 30
          docker compose ps

      - name: Check backend health
        run: |
          max_attempts=10
          attempt=0
          until curl -f http://localhost:5162/api/MoodEntries || [ $attempt -eq $max_attempts ]; do
            echo "Waiting for backend... (attempt $((++attempt))/$max_attempts)"
            sleep 5
          done
          if [ $attempt -eq $max_attempts ]; then
            echo "❌ Backend health check failed"
            docker compose logs backend
            exit 1
          fi
          echo "✅ Backend is healthy"

      - name: Check frontend health
        run: |
          if curl -f http://localhost:5173 > /dev/null 2>&1; then
            echo "✅ Frontend is healthy"
          else
            echo "❌ Frontend health check failed"
            docker compose logs frontend
            exit 1
          fi

      - name: Cleanup
        if: always()
        run: docker compose down -v

  # Quality Gate
  quality-gate:
    name: Quality Gate - All Checks Passed
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests, docker-build]
    if: always()
    
    steps:
      - name: Check all jobs status
        run: |
          if [ "${{ needs.backend-tests.result }}" != "success" ]; then
            echo "❌ Backend tests failed"
            exit 1
          fi
          if [ "${{ needs.frontend-tests.result }}" != "success" ]; then
            echo "❌ Frontend tests failed"
            exit 1
          fi
          if [ "${{ needs.docker-build.result }}" != "success" ]; then
            echo "❌ Docker build failed"
            exit 1
          fi
          echo "✅ All quality checks passed!"
