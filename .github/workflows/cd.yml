name: CD - Continuous Deployment

on:
  push:
    branches: [ main ]
  workflow_dispatch: # Allow manual triggering

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Build and Push Docker Images
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    outputs:
      backend_tag: ${{ steps.meta-backend.outputs.tags }}
      frontend_tag: ${{ steps.meta-frontend.outputs.tags }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for backend
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend/MoodTrackerAPI
          file: ./backend/MoodTrackerAPI/Dockerfile
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract metadata for frontend
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL || 'http://localhost:5162/api/MoodEntries' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Deploy to Cloud (Template for Render/Railway/Azure)
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build-and-push
    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Option 1: Deploy to Render
      # Uncomment and configure when ready to deploy
      # - name: Deploy to Render
      #   run: |
      #     curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
      #     echo "Deployed to Render"

      # Option 2: Deploy to Railway
      # Uncomment and configure when ready to deploy
      # - name: Deploy to Railway
      #   uses: bervProject/railway-deploy@main
      #   with:
      #     railway_token: ${{ secrets.RAILWAY_TOKEN }}
      #     service: moodtracker-api

      # Option 3: Deploy to Azure Container Apps (if using Azure)
      # - name: Azure Login
      #   uses: azure/login@v1
      #   with:
      #     creds: ${{ secrets.AZURE_CREDENTIALS }}
      #
      # - name: Deploy to Azure Container Apps
      #   uses: azure/container-apps-deploy-action@v1
      #   with:
      #     containerAppName: moodtracker
      #     resourceGroup: moodtracker-rg
      #     imageToDeploy: ${{ needs.build-and-push.outputs.backend_tag }}

      - name: Deployment Status
        id: deploy
        run: |
          echo "🚀 Deployment triggered successfully!"
          echo "url=https://your-app-url.com" >> $GITHUB_OUTPUT
          echo ""
          echo "📝 Next steps to complete deployment:"
          echo "1. Configure deployment secrets in GitHub Settings > Secrets:"
          echo "   - RENDER_DEPLOY_HOOK_URL (for Render)"
          echo "   - RAILWAY_TOKEN (for Railway)"
          echo "   - AZURE_CREDENTIALS (for Azure)"
          echo "   - VITE_API_URL (production API URL)"
          echo ""
          echo "2. Uncomment the deployment step for your chosen platform"
          echo "3. Update the production URL in this workflow"

  # Notify deployment status
  notify:
    name: Notify Team
    runs-on: ubuntu-latest
    needs: [build-and-push, deploy]
    if: always()
    
    steps:
      - name: Deployment Summary
        run: |
          echo "## 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** ${{ needs.deploy.result }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Author:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ needs.deploy.result }}" == "success" ]; then
            echo "✅ Deployment completed successfully!" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Deployment failed. Check logs for details." >> $GITHUB_STEP_SUMMARY
          fi

      # Optional: Send notification to Discord/Slack
      # - name: Discord notification
      #   uses: Ilshidur/action-discord@master
      #   with:
      #     args: 'Deployment ${{ needs.deploy.result }}: {{ EVENT_PAYLOAD.repository.full_name }}@{{ GITHUB_SHA }}'
      #   env:
      #     DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
