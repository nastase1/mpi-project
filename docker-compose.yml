services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: moodtracker-db
    environment:
      - POSTGRES_USER=moodtracker_user
      - POSTGRES_PASSWORD=YourStrong@Password123
      - POSTGRES_DB=MoodTrackerDb
    ports:
      - "5432:5432"
    volumes:
      - moodtracker-data:/var/lib/postgresql/data
    networks:
      - moodtracker-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U moodtracker_user -d MoodTrackerDb"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Backend API
  backend:
    build:
      context: ./backend/MoodTrackerAPI
      dockerfile: Dockerfile
    container_name: moodtracker-backend
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Host=db;Database=MoodTrackerDb;Username=moodtracker_user;Password=YourStrong@Password123;
    ports:
      - "5162:8080"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - moodtracker-network
    restart: unless-stopped

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:5162/api/MoodEntries
    container_name: moodtracker-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    networks:
      - moodtracker-network
    restart: unless-stopped

networks:
  moodtracker-network:
    driver: bridge

volumes:
  moodtracker-data:
