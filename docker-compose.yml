services:
  # SQL Server Database
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: moodtracker-db
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=YourStrong@Password123
      - MSSQL_PID=Express
    ports:
      - "1433:1433"
    volumes:
      - moodtracker-data:/var/opt/mssql
    networks:
      - moodtracker-network
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P YourStrong@Password123 -Q 'SELECT 1' -C || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  # Backend API
  backend:
    build:
      context: ./backend/MoodTrackerAPI
      dockerfile: Dockerfile
    container_name: moodtracker-backend
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Server=db;Database=MoodTrackerDb;User Id=sa;Password=YourStrong@Password123;TrustServerCertificate=True;
    ports:
      - "5162:8080"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - moodtracker-network
    restart: unless-stopped

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:5162/api/MoodEntries
    container_name: moodtracker-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    networks:
      - moodtracker-network
    restart: unless-stopped

networks:
  moodtracker-network:
    driver: bridge

volumes:
  moodtracker-data:
